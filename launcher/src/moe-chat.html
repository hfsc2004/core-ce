<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>PSF Relay Pipeline Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pc-ui-scale: 1.5;
      --pc-bg: #0e1621;
      --pc-bg-2: #111c2a;
      --pc-bg-3: #0b1219;
      --pc-text: #c9d1d9;
      --pc-text-muted: #8b949e;
      --pc-border: rgba(88, 166, 255, 0.12);
      --pc-blue: #58a6ff;
      --pc-green: #3fb950;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: var(--pc-bg);
      color: var(--pc-text);
    }

    body {
      display: flex;
      flex-direction: column;
      transform: scale(var(--pc-ui-scale));
      transform-origin: top left;
      width: calc(100% / var(--pc-ui-scale));
      height: calc(100% / var(--pc-ui-scale));
    }

    .header {
      background: var(--pc-bg-2);
      border-bottom: 1px solid var(--pc-border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 52px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .header-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--pc-green);
      border: 1px solid rgba(63, 185, 80, 0.35);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.04em;
      background: rgba(63, 185, 80, 0.05);
      white-space: nowrap;
    }

    .status-badge::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--pc-green);
      animation: statusBlink 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-badge.disconnected {
      color: #ffb3b3;
      border-color: rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.08);
    }

    .status-badge.disconnected::before {
      background: #ff6b6b;
      animation: none;
    }

    .status-badge.processing {
      color: #ffd76a;
      border-color: rgba(255, 212, 0, 0.45);
      background: rgba(255, 212, 0, 0.1);
    }

    .status-badge.processing::before {
      background: #ffd400;
      animation: statusPulse 1.2s ease-in-out infinite;
    }

    @keyframes statusBlink {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    @keyframes statusPulse {
      0%,
      100% {
        opacity: 0.92;
      }
      50% {
        opacity: 1;
      }
    }

    .kvm-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .kvm-label {
      color: #484f58;
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .kvm-select-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .kvm-select-icon {
      position: absolute;
      left: 10px;
      width: 13px;
      height: 13px;
      pointer-events: none;
      color: var(--pc-blue);
    }

    .kvm-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: var(--pc-bg);
      border: 1px solid rgba(139, 148, 158, 0.2);
      border-radius: 5px;
      color: var(--pc-text);
      font-size: 11px;
      padding: 5px 10px 5px 30px;
      min-width: 240px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .kvm-select:hover,
    .kvm-select:focus {
      border-color: rgba(88, 166, 255, 0.35);
    }

    .kvm-select option {
      background: var(--pc-bg);
      color: var(--pc-text);
    }

    .kvm-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--pc-green);
      border: 1px solid rgba(63, 185, 80, 0.3);
      border-radius: 5px;
      padding: 5px 10px;
      background: rgba(63, 185, 80, 0.05);
      white-space: nowrap;
      min-width: 88px;
      justify-content: center;
    }

    .kvm-indicator::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--pc-green);
      opacity: 0.9;
      flex-shrink: 0;
    }

    .kvm-indicator.direct {
      color: var(--pc-blue);
      border-color: rgba(88, 166, 255, 0.3);
      background: rgba(88, 166, 255, 0.08);
    }

    .kvm-indicator.direct::before {
      background: var(--pc-blue);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--pc-bg);
    }

    .message {
      border-left: 2px solid rgba(88, 166, 255, 0.3);
      padding: 9px 12px;
      border-radius: 0 5px 5px 0;
      background: rgba(88, 166, 255, 0.04);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-header {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--pc-blue);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .message-content {
      font-family: "JetBrains Mono", "Consolas", "Monaco", monospace;
      font-size: 11px;
      color: #8b9eb0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: rgba(88, 166, 255, 0.08);
      border-left-color: rgba(88, 166, 255, 0.45);
    }

    .message.agent,
    .message.direct {
      background: rgba(143, 163, 186, 0.08);
      border-left-color: rgba(139, 148, 158, 0.5);
    }

    .message.agent .message-header,
    .message.direct .message-header {
      color: #9fc3eb;
    }

    .message.final {
      background: rgba(63, 185, 80, 0.08);
      border-left-color: rgba(63, 185, 80, 0.5);
    }

    .message.final .message-header {
      color: var(--pc-green);
    }

    .message.error {
      background: rgba(255, 107, 107, 0.1);
      border-left-color: rgba(255, 107, 107, 0.6);
    }

    .message.error .message-header,
    .message.error .message-content {
      color: #ffb3b3;
    }

    .message.system {
      background: rgba(88, 166, 255, 0.04);
      border-left-color: rgba(88, 166, 255, 0.5);
    }

    .message.system .message-header,
    .message.system .message-content {
      color: #58a6ff;
    }

    .message-header-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .message-info-icon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(88, 166, 255, 0.15);
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 15px;
      color: #7f8892;
      font-size: 11px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--pc-blue);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

    .input-container {
      background: var(--pc-bg-2);
      border-top: 1px solid rgba(88, 166, 255, 0.1);
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: var(--pc-bg);
      border: 1px solid rgba(139, 148, 158, 0.2);
      border-radius: 5px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--pc-text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    #chat-input:focus {
      border-color: rgba(88, 166, 255, 0.4);
    }

    #chat-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #attach-btn,
    #voice-btn,
    #voice-mode-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      border: 1px solid rgba(139, 148, 158, 0.2);
      background: transparent;
      border-radius: 5px;
      font-size: 11px;
      color: var(--pc-text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    #attach-btn:hover:not(:disabled),
    #voice-btn:hover:not(:disabled),
    #voice-mode-btn:hover:not(:disabled) {
      border-color: rgba(88, 166, 255, 0.35);
      color: var(--pc-text);
    }

    #attach-btn:disabled,
    #voice-btn:disabled,
    #voice-mode-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #voice-btn.recording {
      border-color: #ff6b6b;
      color: #ffd7d7;
      box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.2);
    }

    #voice-mode-btn.vox {
      border-color: rgba(88, 166, 255, 0.45);
      background: rgba(88, 166, 255, 0.12);
      color: #eaf3ff;
    }

    #send-btn {
      padding: 7px 20px;
      background: #1f6feb;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) {
      background: #388bfd;
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #attached-file-chip {
      display: none;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 7px 9px;
      background: rgba(88, 166, 255, 0.12);
      border: 1px solid rgba(88, 166, 255, 0.35);
      border-radius: 5px;
      color: #bfdcff;
      font-size: 11px;
    }

    #clear-attach-btn {
      display: none;
      padding: 7px 9px;
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.4);
      border-radius: 5px;
      color: #ffb7b7;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    #clear-attach-btn:hover {
      background: rgba(255, 107, 107, 0.18);
    }

    .activity-container {
      background: #0b131d;
      border-top: 1px solid rgba(88, 166, 255, 0.12);
      padding: 8px 14px;
      flex-shrink: 0;
    }

    .activity-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }

    .activity-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #9fb2cc;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .activity-clear-btn {
      font-size: 10px;
      color: #7a838f;
      background: transparent;
      border: 1px solid rgba(139, 148, 158, 0.24);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .activity-clear-btn:hover {
      color: var(--pc-text);
      border-color: rgba(139, 148, 158, 0.4);
    }

    .activity-log {
      max-height: 120px;
      min-height: 64px;
      overflow-y: auto;
      font-family: "JetBrains Mono", "Consolas", "Monaco", monospace;
      font-size: 10px;
      line-height: 1.45;
      color: #9fb2cc;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(139, 148, 158, 0.14);
      border-radius: 5px;
      padding: 7px 8px;
    }

    .activity-empty {
      color: #687384;
    }

    .status-bar {
      background: var(--pc-bg-3);
      border-top: 1px solid rgba(88, 166, 255, 0.08);
      padding: 5px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    .pipeline-flow {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 148, 158, 0.45) transparent;
    }

    .agent-node {
      font-size: 10px;
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 3px;
      padding: 2px 8px;
      letter-spacing: 0.04em;
      background: rgba(56, 189, 248, 0.05);
    }

    .arrow {
      font-size: 10px;
      color: #5f6a76;
    }

    .clear-btn {
      font-size: 10px;
      color: #7a838f;
      background: transparent;
      border: 1px solid rgba(139, 148, 158, 0.2);
      border-radius: 3px;
      padding: 2px 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    .clear-btn:hover {
      color: var(--pc-text);
      border-color: rgba(139, 148, 158, 0.35);
    }

    .message-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .message-action-btn {
      background: rgba(88, 166, 255, 0.12);
      border: 1px solid rgba(88, 166, 255, 0.35);
      border-radius: 4px;
      color: #bcd8f0;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .message-action-btn:hover {
      background: rgba(88, 166, 255, 0.2);
      border-color: rgba(88, 166, 255, 0.55);
      color: #d6ecff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>
        <span class="header-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#58a6ff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="5" width="5" height="5" rx="1.5"></rect>
            <rect x="10" y="2" width="5" height="5" rx="1.5"></rect>
            <rect x="10" y="9" width="5" height="5" rx="1.5"></rect>
            <line x1="6" y1="7.5" x2="10" y2="4.5"></line>
            <line x1="6" y1="7.5" x2="10" y2="11.5"></line>
          </svg>
        </span>
        PSF Relay Pipeline Chat
      </h1>
      <span id="status-badge" class="status-badge disconnected">Connecting...</span>
    </div>

    <div class="kvm-section">
      <span class="kvm-label">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round">
          <rect x="1" y="2" width="10" height="7" rx="1"></rect>
          <line x1="3" y1="11" x2="9" y2="11"></line>
          <line x1="6" y1="9" x2="6" y2="11"></line>
        </svg>
        KVM
      </span>
      <div class="kvm-select-wrap">
        <span class="kvm-select-icon" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="4" height="4" rx="1"></rect>
            <rect x="8" y="1" width="4" height="4" rx="1"></rect>
            <rect x="8" y="8" width="4" height="4" rx="1"></rect>
            <line x1="5" y1="6" x2="8" y2="3"></line>
            <line x1="5" y1="6" x2="8" y2="10"></line>
          </svg>
        </span>
        <select id="kvm-select" class="kvm-select">
          <option value="pipeline">Full Pipeline (Chain All)</option>
        </select>
      </div>
      <span id="kvm-indicator" class="kvm-indicator">Pipeline</span>
    </div>
  </div>

  <div id="chat-messages" class="messages-container">
    <div class="message system">
      <div class="message-header"><span class="message-header-inline message-system-inline"><span class="message-info-icon" aria-hidden="true"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="5" r="4"></circle><line x1="5" y1="4" x2="5" y2="7"></line><circle cx="5" cy="2.5" r="0.4" fill="#58a6ff" stroke="none"></circle></svg></span>SYSTEM</span></div>
      <div class="message-content">Connecting to pipeline...</div>
    </div>
  </div>

  <div class="input-container">
    <input type="text" id="chat-input" placeholder="Type a message to send through the full pipeline..." disabled>
    <button id="attach-btn" disabled title="Attach source file">Attach Code</button>
    <span id="attached-file-chip"></span>
    <button id="clear-attach-btn" title="Clear attached file">Clear</button>
    <button id="voice-btn" disabled title="Voice-to-text (right-click to switch provider)">Voice Off</button>
    <button id="voice-mode-btn" disabled title="Voice mode: PTT (manual Send)">PTT</button>
    <button id="send-btn" disabled>Send</button>
  </div>

  <div class="activity-container">
    <div class="activity-header">
      <span class="activity-title">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#9fb2cc" stroke-width="1.4" stroke-linecap="round">
          <rect x="1.2" y="1.2" width="9.6" height="9.6" rx="1.6"></rect>
          <line x1="3.2" y1="4.2" x2="8.8" y2="4.2"></line>
          <line x1="3.2" y1="6.2" x2="8.8" y2="6.2"></line>
          <line x1="3.2" y1="8.2" x2="6.8" y2="8.2"></line>
        </svg>
        Activity
      </span>
      <button id="activity-clear-btn" class="activity-clear-btn">Clear</button>
    </div>
    <div id="activity-log" class="activity-log">
      <div class="activity-empty">No activity yet.</div>
    </div>
  </div>

  <div class="status-bar">
    <div id="pipeline-flow" class="pipeline-flow"></div>
    <button class="clear-btn" onclick="MoEChat.clearHistory()">Clear History</button>
  </div>

  <script src="shared-speech-engine.js"></script>
  <script src="shared-voice-to-text-adapters.js"></script>
  <script src="shared-voice-to-text-controller.js"></script>
  <script src="shared-voice-to-text.js"></script>
  <script src="moe-chat-renderer-utils.js"></script>
  <script src="moe-chat-renderer-esp32.js"></script>
  <script src="moe-chat-renderer-messages.js"></script>
  <script src="moe-chat-renderer-pipeline.js"></script>
  <script src="moe-chat-renderer-voice-activity.js"></script>
  <script src="moe-chat-renderer-render.js"></script>
  <script src="moe-chat-renderer-session.js"></script>
  <script src="moe-chat-renderer.js"></script>
  <script>
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => MoEChat.initialize());
    } else {
      MoEChat.initialize();
    }
  </script>
</body>
</html>
