<!DOCTYPE html>
<!-- Version: 1.1.3 -->
<!-- Copyright © 2026 Pseudo SF -->
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #00ffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      border-radius: 15px;
      border: 2px solid #00ffff;
      overflow: hidden;
    }
    .logo-img {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
      filter: none;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ffff;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 255, 255, 0.2);
      border-top: 4px solid #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status {
      font-size: 16px;
      color: #fff;
      margin-bottom: 10px;
    }
    .substatus {
      font-size: 12px;
      color: #666;
    }
    .footer {
      position: absolute;
      bottom: 15px;
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>
  <img class="logo-img" src="../assets/PSF_Logo_White_256.png" alt="Pseudo Science Fiction Logo" />
  <div class="subtitle">AI / LLM Archive Collection</div>
  <div class="spinner"></div>
  <div class="status" id="status">Starting Open WebUI...</div>
  <div class="substatus" id="substatus">This may take a moment on first launch</div>
  <div class="footer">Preparing your AI experience...</div>
</body>
</html>
