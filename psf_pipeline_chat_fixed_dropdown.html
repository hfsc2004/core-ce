
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  .pc-root { background:#0e1621; font-family:'Inter',sans-serif; color:#c9d1d9; display:flex; flex-direction:column; min-height:580px; }
  .pc-titlebar { background:#0b1219; display:flex; align-items:center; justify-content:space-between; padding:0 14px; height:34px; border-bottom:1px solid rgba(88,166,255,0.1); flex-shrink:0; }
  .pc-titlebar-title { font-size:11px; color:#6e7681; letter-spacing:0.04em; }
  .pc-winbtn { width:11px; height:11px; border-radius:50%; display:inline-block; margin-left:6px; }
  .pc-header { background:#111c2a; display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid rgba(88,166,255,0.12); flex-shrink:0; gap:10px; }
  .pc-branding { display:flex; align-items:center; gap:8px; }
  .pc-branding-name { font-size:13px; font-weight:600; color:#e6edf3; letter-spacing:0.02em; }
  .pc-ready-badge { display:flex; align-items:center; gap:5px; font-size:10px; color:#3fb950; border:1px solid rgba(63,185,80,0.35); border-radius:20px; padding:3px 10px; letter-spacing:0.04em; }
  .pc-ready-dot { width:5px; height:5px; border-radius:50%; background:#3fb950; animation:blink 2.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pc-header-right { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .pc-kvm-label { font-size:10px; color:#484f58; display:flex; align-items:center; gap:5px; }

  /* Custom dropdown wrapper */
  .pc-dropdown-wrap { position:relative; display:flex; align-items:center; }
  .pc-dropdown-icon { position:absolute; left:10px; pointer-events:none; z-index:1; }
  .pc-select { background:#0e1621; border:1px solid rgba(139,148,158,0.2); border-radius:5px; color:#c9d1d9; font-size:11px; font-family:'Inter',sans-serif; padding:5px 10px 5px 30px; outline:none; min-width:200px; appearance:none; cursor:pointer; transition:border-color 0.2s; }
  .pc-select:hover { border-color:rgba(88,166,255,0.35); }

  .pc-pipeline-pill { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:500; color:#3fb950; border:1px solid rgba(63,185,80,0.3); border-radius:5px; padding:5px 10px; background:rgba(63,185,80,0.05); }
  .pc-body { flex:1; padding:16px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
  .pc-msg { border-left:2px solid rgba(88,166,255,0.3); padding:9px 12px; background:rgba(88,166,255,0.04); border-radius:0 5px 5px 0; }
  .pc-msg-header { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
  .pc-msg-icon { width:16px; height:16px; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(88,166,255,0.15); }
  .pc-msg-label { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#58a6ff; }
  .pc-msg-text { font-family:'JetBrains Mono',monospace; font-size:11px; color:#8b9eb0; line-height:1.6; }
  .pc-input-bar { background:#111c2a; border-top:1px solid rgba(88,166,255,0.1); padding:10px 14px; display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .pc-input { flex:1; background:#0e1621; border:1px solid rgba(139,148,158,0.2); border-radius:5px; padding:9px 12px; font-size:12px; color:#c9d1d9; font-family:'Inter',sans-serif; outline:none; transition:border-color 0.2s; }
  .pc-input:focus { border-color:rgba(88,166,255,0.4); }
  .pc-ibtn { display:flex; align-items:center; gap:5px; padding:7px 12px; border:1px solid rgba(139,148,158,0.2); background:transparent; border-radius:5px; font-size:11px; color:#8b949e; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; white-space:nowrap; }
  .pc-ibtn:hover { border-color:rgba(88,166,255,0.35); color:#c9d1d9; }
  .pc-send-btn { padding:7px 20px; background:#1f6feb; border:none; border-radius:5px; font-size:12px; font-weight:500; color:#fff; cursor:pointer; font-family:'Inter',sans-serif; transition:background 0.2s; }
  .pc-send-btn:hover { background:#388bfd; }
  .pc-statusbar { background:#0b1219; border-top:1px solid rgba(88,166,255,0.08); padding:5px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .pc-agent-tag { font-size:10px; color:#a371f7; border:1px solid rgba(163,113,247,0.3); border-radius:3px; padding:2px 8px; letter-spacing:0.04em; }
  .pc-clear-btn { font-size:10px; color:#484f58; background:transparent; border:1px solid rgba(139,148,158,0.15); border-radius:3px; padding:2px 10px; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
  .pc-clear-btn:hover { color:#c9d1d9; border-color:rgba(139,148,158,0.35); }
</style>

<div class="pc-root">

  <div class="pc-titlebar">
    <div><span class="pc-winbtn" style="background:#ff5f57"></span><span class="pc-winbtn" style="background:#febc2e"></span><span class="pc-winbtn" style="background:#28c840"></span></div>
    <div class="pc-titlebar-title">PSF Relay Pipeline Chat</div>
    <div style="width:50px"></div>
  </div>

  <div class="pc-header">
    <div class="pc-branding">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#58a6ff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="5" width="5" height="5" rx="1.5"/>
        <rect x="10" y="2" width="5" height="5" rx="1.5"/>
        <rect x="10" y="9" width="5" height="5" rx="1.5"/>
        <line x1="6" y1="7.5" x2="10" y2="4.5"/>
        <line x1="6" y1="7.5" x2="10" y2="11.5"/>
      </svg>
      <span class="pc-branding-name">PSF Relay Pipeline Chat</span>
    </div>
    <div class="pc-ready-badge">
      <span class="pc-ready-dot"></span>
      Ready · 1 agent
    </div>
    <div class="pc-header-right">
      <div class="pc-kvm-label">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="2" width="10" height="7" rx="1"/><line x1="3" y1="11" x2="9" y2="11"/><line x1="6" y1="9" x2="6" y2="11"/></svg>
        KVM
      </div>

      <!-- Dropdown with inline SVG icon instead of emoji -->
      <div class="pc-dropdown-wrap">
        <svg class="pc-dropdown-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#58a6ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="4" height="4" rx="1"/>
          <rect x="8" y="1" width="4" height="4" rx="1"/>
          <rect x="8" y="8" width="4" height="4" rx="1"/>
          <line x1="5" y1="6" x2="8" y2="3"/>
          <line x1="5" y1="6" x2="8" y2="10"/>
        </svg>
        <select class="pc-select">
          <option>Full Pipeline (Chain All)</option>
          <option>Single Agent</option>
          <option>Dynamic Routing</option>
        </select>
      </div>

      <div class="pc-pipeline-pill">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="#3fb950"><circle cx="5" cy="5" r="3"/></svg>
        Pipeline
      </div>
    </div>
  </div>

  <div class="pc-body">
    <div class="pc-msg">
      <div class="pc-msg-header">
        <div class="pc-msg-icon">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"><circle cx="5" cy="5" r="4"/><line x1="5" y1="4" x2="5" y2="7"/><circle cx="5" cy="2.5" r="0.4" fill="#58a6ff" stroke="none"/></svg>
        </div>
        <span class="pc-msg-label">System</span>
      </div>
      <div class="pc-msg-text">Pipeline connected. Your message will flow through each agent in sequence.</div>
    </div>
  </div>

  <div class="pc-input-bar">
    <input class="pc-input" type="text" placeholder="Type a message to send through the full pipeline..."/>
    <button class="pc-ibtn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1,5.5 C1,3 5.5,1 10,5.5 C5.5,10 1,8 1,5.5Z"/><circle cx="5.5" cy="5.5" r="1.5"/></svg>
      Attach Code
    </button>
    <button class="pc-ibtn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="1" width="5" height="6" rx="2.5"/><path d="M1,5.5 Q1,9 5.5,9 Q10,9 10,5.5"/><line x1="5.5" y1="9" x2="5.5" y2="11"/></svg>
      Voice Off
    </button>
    <button class="pc-ibtn">PTT</button>
    <button class="pc-send-btn">Send</button>
  </div>

  <div class="pc-statusbar">
    <span class="pc-agent-tag">New Agent</span>
    <button class="pc-clear-btn">Clear History</button>
  </div>

</div>
