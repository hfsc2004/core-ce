
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@700;800&family=Inter:wght@300;400;800;900&display=swap');
  .wm-root { background:#0e1621; padding:32px; display:flex; flex-direction:column; gap:20px; }
  .wm-row { display:flex; align-items:center; gap:20px; padding:24px 28px; background:#111c2a; border:1px solid rgba(139,148,158,0.12); border-radius:8px; cursor:pointer; transition:border-color 0.2s; }
  .wm-row:hover { border-color:rgba(88,166,255,0.35); }
  .wm-label { font-family:'Inter',sans-serif; font-size:9px; color:#484f58; letter-spacing:0.15em; text-transform:uppercase; width:16px; flex-shrink:0; }

  /* A — Brackets */
  .wm-a { font-family:'Rajdhani',sans-serif; font-size:40px; font-weight:700; color:#e6edf3; letter-spacing:0.1em; display:flex; align-items:center; }
  .wm-a-bracket { color:#58a6ff; font-size:48px; font-weight:300; line-height:1; }

  /* B — Orbitron */
  .wm-b { font-family:'Orbitron',sans-serif; font-size:32px; font-weight:700; color:#e6edf3; letter-spacing:0.1em; }

  /* C — First letter accent */
  .wm-c { font-family:'Exo 2',sans-serif; font-size:42px; font-weight:800; letter-spacing:0.06em; color:#e6edf3; }
  .wm-c span { color:#58a6ff; }

  /* D — Rule underneath */
  .wm-d-wrap { display:flex; flex-direction:column; gap:5px; }
  .wm-d { font-family:'Inter',sans-serif; font-size:38px; font-weight:900; color:#e6edf3; letter-spacing:0.2em; line-height:1; }
  .wm-d-rule { width:100%; height:2px; background:linear-gradient(90deg, #58a6ff 60%, transparent); border-radius:1px; }

  /* E — IRG icon mark beside wordmark */
  .wm-e-wrap { display:flex; align-items:center; gap:14px; }
  .wm-e-icon { flex-shrink:0; }
  .wm-e { font-family:'Rajdhani',sans-serif; font-size:40px; font-weight:700; color:#e6edf3; letter-spacing:0.1em; line-height:1; }

  /* F — Dot accent */
  .wm-f { font-family:'Inter',sans-serif; font-size:38px; font-weight:900; color:#e6edf3; letter-spacing:0.14em; display:flex; align-items:center; gap:6px; }
  .wm-f-dot { width:8px; height:8px; border-radius:50%; background:#58a6ff; flex-shrink:0; margin-bottom:4px; }
</style>

<div class="wm-root">

  <!-- A -->
  <div class="wm-row">
    <div class="wm-label">A</div>
    <div class="wm-a">
      <span class="wm-a-bracket">[</span>CORE<span class="wm-a-bracket">]</span>
    </div>
  </div>

  <!-- B -->
  <div class="wm-row">
    <div class="wm-label">B</div>
    <div class="wm-b">CORE</div>
  </div>

  <!-- C -->
  <div class="wm-row">
    <div class="wm-label">C</div>
    <div class="wm-c"><span>C</span>ORE</div>
  </div>

  <!-- D -->
  <div class="wm-row">
    <div class="wm-label">D</div>
    <div class="wm-d-wrap">
      <div class="wm-d">CORE</div>
      <div class="wm-d-rule"></div>
    </div>
  </div>

  <!-- E — IRG node mark beside wordmark -->
  <div class="wm-row">
    <div class="wm-label">E</div>
    <div class="wm-e-wrap">
      <svg class="wm-e-icon" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <rect x="1" y="14" width="10" height="10" rx="2" stroke="#58a6ff" stroke-width="1.8"/>
        <rect x="27" y="4" width="10" height="10" rx="2" stroke="#58a6ff" stroke-width="1.8"/>
        <rect x="27" y="24" width="10" height="10" rx="2" stroke="#58a6ff" stroke-width="1.8"/>
        <line x1="11" y1="19" x2="27" y2="9" stroke="#58a6ff" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="11" y1="19" x2="27" y2="29" stroke="#58a6ff" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="wm-e">CORE</div>
    </div>
  </div>

  <!-- F -->
  <div class="wm-row">
    <div class="wm-label">F</div>
    <div class="wm-f">
      <div class="wm-f-dot"></div>
      CORE
    </div>
  </div>

</div>
